<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SwimCoach">
  <title>SwimCoach — Gestão de Treinos</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="hdr-left">
        <div class="hdr-title" id="hdrTitle">SwimCoach</div>
        <div class="hdr-sub" id="hdrSub">—</div>
      </div>
      <div class="session-toggle">
        <button class="sess-btn active" id="btnManha" onclick="setSessao('manha')">Manhã</button>
        <button class="sess-btn" id="btnTarde" onclick="setSessao('tarde')">Tarde</button>
      </div>
    </div>

    <main id="content"></main>

    <nav id="nav">
      <button class="nav-btn active" id="nav-plano" onclick="showTab('plano')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
        Plano
      </button>
      <button class="nav-btn" id="nav-live" onclick="showTab('live')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4v16"/><path d="M8 5h8a4 4 0 010 8H8z"/><path d="M8 13h7a3 3 0 010 6H8z"/></svg>
        Live
      </button>
      <button class="nav-btn" id="nav-cronometro" onclick="showTab('cronometro')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5M9 3h6"/></svg>
        Cronómetro
      </button>
      <button class="nav-btn" id="nav-zonas" onclick="showTab('zonas')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 20h18M7 20V10M12 20V4M17 20v-7"/></svg>
        Zonas
      </button>
      <button class="nav-btn" id="nav-atletas" onclick="showTab('atletas')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75M21 21v-2a4 4 0 00-3-3.87"/></svg>
        Atletas
      </button>
      <button class="nav-btn" id="nav-resultados" onclick="showTab('resultados')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 17H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v5"/><path d="M9 11l3 3L22 4"/><path d="M16 19h6M19 16v6"/></svg>
        Resultados
      </button>
    </nav>
  </div>

  <div id="modal" style="display:none" class="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalBody"></div>
      <div class="modal-btns" id="modalBtns"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js" defer></script>

  <!-- Vercel Web Analytics: static HTML/PWA integration.
       If Vercel shows a project-specific unique path in the dashboard,
       replace the src below with that exact path. -->
  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- Vercel Speed Insights: static HTML/PWA integration.
       If Vercel shows a project-specific unique path in the dashboard,
       replace the src below with that exact path. -->
  <script>
    window.si = window.si || function () {
      (window.siq = window.siq || []).push(arguments);
    };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
